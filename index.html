<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAQI·LUX — Киім дүкені</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}

nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid #e5e5e5;background:#fff;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:600;letter-spacing:0.05em}
.nav-links{display:flex;gap:24px}
.nav-link{font-size:14px;color:#666;cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;transition:all .15s;text-decoration:none}
.nav-link:hover,.nav-link.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.nav-actions{display:flex;gap:14px;align-items:center}
.nav-icon{font-size:20px;color:#555;cursor:pointer;position:relative;padding:4px}
.nav-icon:hover{color:#1a1a1a}
.cart-badge{position:absolute;top:-2px;right:-4px;background:#C8A55A;color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

.hero-bar{background:#0D0B08;padding:9px 24px;text-align:center;font-size:13px;color:#aaa}
.hero-bar span{color:#C8A55A;font-weight:600}

.filters{display:flex;gap:8px;padding:16px 24px 14px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #e5e5e5}
.filter-btn{font-size:13px;padding:7px 16px;border-radius:99px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:#1a1a1a;color:#1a1a1a}
.filter-btn.sel{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.search-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;border:1px solid #ddd;border-radius:8px;padding:0 14px;height:36px;background:#fff}
.search-wrap input{border:none;outline:none;background:transparent;font-size:13px;color:#1a1a1a;width:160px}
.search-wrap input::placeholder{color:#aaa}

.main{display:flex;gap:0;min-height:calc(100vh - 120px)}
.products-area{flex:1;padding:20px 24px}
.sidebar{width:300px;padding:20px 20px 20px 0;position:sticky;top:64px;height:fit-content}

.section-title{font-size:13px;font-weight:600;color:#888;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.card:hover{border-color:#ccc;transform:translateY(-2px)}
.card-img{height:190px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative}
.card-badge{position:absolute;top:10px;left:10px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px}
.badge-new{background:#E1F5EE;color:#0F6E56}
.badge-sale{background:#FAECE7;color:#993C1D}
.badge-hot{background:#FAEEDA;color:#854F0B}
.card-wish{position:absolute;top:10px;right:10px;font-size:18px;color:#ccc;cursor:pointer;padding:4px;border-radius:50%;background:#fff;width:30px;height:30px;display:flex;align-items:center;justify-content:center;transition:color .15s}
.card-wish:hover,.card-wish.liked{color:#D4537E}
.card-body{padding:12px 14px}
.card-cat{font-size:11px;color:#aaa;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
.card-name{font-size:14px;font-weight:600;margin-bottom:8px}
.card-sizes{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.sz{font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid #e5e5e5;color:#666;cursor:pointer;transition:all .15s}
.sz:hover{border-color:#1a1a1a;color:#1a1a1a}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.price{font-size:15px;font-weight:700;color:#1a1a1a}
.old-price{font-size:12px;color:#bbb;text-decoration:line-through;margin-left:6px}
.add-btn{font-size:12px;padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;font-weight:500}
.add-btn:hover{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.add-btn.added{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5}

/* Cart sidebar */
.cart-box{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px}
.cart-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.cart-empty{font-size:13px;color:#aaa;text-align:center;padding:20px 0}
.cart-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0}
.cart-item:last-of-type{border-bottom:none}
.ci-icon{font-size:26px;min-width:38px;text-align:center}
.ci-name{font-size:13px;font-weight:500;flex:1;line-height:1.3}
.ci-price{font-size:13px;font-weight:600;white-space:nowrap}
.ci-rm{font-size:16px;color:#ccc;cursor:pointer;padding:4px;transition:color .15s}
.ci-rm:hover{color:#E24B4A}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid #eee}
.total-label{font-size:13px;color:#888}
.total-val{font-size:17px;font-weight:700}
.checkout-btn{width:100%;margin-top:12px;padding:12px;border-radius:10px;border:none;background:#C8A55A;color:#fff;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.03em;transition:opacity .15s}
.checkout-btn:hover{opacity:0.88}
.checkout-btn:disabled{opacity:0.4;cursor:not-allowed}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:480px;max-width:95vw;overflow:hidden}
.modal-img{height:220px;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative}
.modal-close{position:absolute;top:12px;right:12px;font-size:20px;cursor:pointer;background:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid #eee;color:#666}
.modal-close:hover{color:#1a1a1a}
.modal-body{padding:20px 24px 24px}
.modal-cat{font-size:11px;color:#aaa;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.modal-name{font-size:20px;font-weight:700;margin-bottom:4px}
.modal-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:16px}
.modal-price{font-size:22px;font-weight:700;color:#1a1a1a}
.modal-old{font-size:15px;color:#bbb;text-decoration:line-through}
.modal-label{font-size:12px;font-weight:600;color:#888;margin-bottom:8px;letter-spacing:0.05em;text-transform:uppercase}
.modal-sizes{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.modal-sz{font-size:13px;padding:7px 14px;border-radius:8px;border:1px solid #e5e5e5;cursor:pointer;transition:all .15s;font-weight:500}
.modal-sz:hover,.modal-sz.sel{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.modal-add{width:100%;padding:13px;border-radius:10px;border:none;background:#1a1a1a;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.modal-add:hover{background:#333}
.modal-add.added{background:#0F6E56}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:10px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1}

/* Empty state */
.empty-state{grid-column:span 3;text-align:center;padding:60px 0;color:#aaa}
.empty-state i{font-size:40px;display:block;margin-bottom:12px}

@media(max-width:768px){
  .main{flex-direction:column}
  .sidebar{width:100%;position:static;padding:0 16px 20px}
  .grid{grid-template-columns:repeat(2,1fr)}
  .products-area{padding:16px}
  .nav-links{display:none}
}
</style>
</head>
<body>

<nav>
  <div class="logo">SAQI·LUX</div>
  <div class="nav-links">
    <a class="nav-link active" onclick="filterCat('Барлығы',this)">Бастапқы</a>
    <a class="nav-link" onclick="filterCat('Ер адам',this)">Ер адам</a>
    <a class="nav-link" onclick="filterCat('Әйел',this)">Әйел</a>
    <a class="nav-link" onclick="filterCat('Балалар',this)">Балалар</a>
  </div>
  <div class="nav-actions">
    <span class="nav-icon" title="Іздеу" onclick="document.getElementById('search-inp').focus()"><i class="ti ti-search"></i></span>
    <span class="nav-icon" title="Таңдаулылар" onclick="toggleLikedView()"><i class="ti ti-heart"></i></span>
    <span class="nav-icon" title="Себет" onclick="document.getElementById('sidebar-cart').scrollIntoView({behavior:'smooth'})">
      <i class="ti ti-shopping-bag"></i>
      <span class="cart-badge" id="cart-count">0</span>
    </span>
  </div>
</nav>

<div class="hero-bar">Тегін жеткізу <span>5 000 ₸</span> жоғары тапсырыстарда &nbsp;·&nbsp; Жаңа коллекция келді 🎉</div>

<div class="filters">
  <button class="filter-btn sel" onclick="setFilter(this,'Барлығы')">Барлығы</button>
  <button class="filter-btn" onclick="setFilter(this,'Ер адам')">Ер адам</button>
  <button class="filter-btn" onclick="setFilter(this,'Әйел')">Әйел</button>
  <button class="filter-btn" onclick="setFilter(this,'Балалар')">Балалар</button>
  <button class="filter-btn" onclick="setFilter(this,'Жаңа')">Жаңа</button>
  <button class="filter-btn" onclick="setFilter(this,'Жеңілдік')">Жеңілдік</button>
  <div class="search-wrap">
    <i class="ti ti-search" style="font-size:14px;color:#aaa"></i>
    <input type="text" placeholder="Іздеу..." id="search-inp" oninput="renderGrid()">
  </div>
</div>

<div class="main">
  <div class="products-area">
    <div class="grid" id="product-grid"></div>
  </div>
  <div class="sidebar">
    <div class="cart-box" id="sidebar-cart">
      <div class="cart-title"><i class="ti ti-shopping-bag" style="font-size:17px;color:#C8A55A"></i> Себет</div>
      <div id="cart-body"><div class="cart-empty">Себет бос</div></div>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-img" id="modal-img">
      <span class="modal-close" onclick="closeModalDirect()"><i class="ti ti-x"></i></span>
      <span id="modal-icon"></span>
    </div>
    <div class="modal-body">
      <div class="modal-cat" id="modal-cat"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-price-row">
        <span class="modal-price" id="modal-price"></span>
        <span class="modal-old" id="modal-old"></span>
      </div>
      <div class="modal-label">Өлшем таңдаңыз</div>
      <div class="modal-sizes" id="modal-sizes"></div>
      <button class="modal-add" id="modal-add-btn" onclick="modalAddCart()">
        <i class="ti ti-shopping-bag" style="margin-right:6px"></i> Себетке қосу
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const products=[
  {id:1,name:'Классик пальто',cat:'Ер адам',icon:'🧥',price:28900,badge:'Жаңа',sizes:['S','M','L','XL'],bg:'#E8F5EE'},
  {id:2,name:'Жібек блузка',cat:'Әйел',icon:'👚',price:12500,oldPrice:18000,badge:'Жеңілдік',sizes:['XS','S','M'],bg:'#FDF0EB'},
  {id:3,name:'Балалар костюм',cat:'Балалар',icon:'👕',price:8900,badge:'Жаңа',sizes:['86','92','98','104'],bg:'#E8F5EE'},
  {id:4,name:'Кашемир свитер',cat:'Ер адам',icon:'🧣',price:22000,badge:'Hot',sizes:['M','L','XL','XXL'],bg:'#FDF5E6'},
  {id:5,name:'Жазғы көйлек',cat:'Әйел',icon:'👗',price:15500,oldPrice:20000,badge:'Жеңілдік',sizes:['XS','S','M','L'],bg:'#FDF0EB'},
  {id:6,name:'Спорт шалбар',cat:'Ер адам',icon:'👖',price:9800,badge:'',sizes:['S','M','L'],bg:'#f5f5f5'},
  {id:7,name:'Балалар жейде',cat:'Балалар',icon:'🎽',price:5500,badge:'Жаңа',sizes:['92','98','104','110'],bg:'#E8F5EE'},
  {id:8,name:'Люкс тон',cat:'Әйел',icon:'🥻',price:45000,badge:'Hot',sizes:['S','M'],bg:'#FDF5E6'},
  {id:9,name:'Джинс шалбар',cat:'Ер адам',icon:'👖',price:14500,badge:'',sizes:['28','30','32','34','36'],bg:'#f5f5f5'},
  {id:10,name:'Қыздар туникасы',cat:'Балалар',icon:'👘',price:6800,badge:'Жаңа',sizes:['98','104','110','116'],bg:'#E8F5EE'},
  {id:11,name:'Люкс пальто',cat:'Әйел',icon:'🧥',price:52000,badge:'Hot',sizes:['XS','S','M','L'],bg:'#FDF5E6'},
  {id:12,name:'Спорт жейдесі',cat:'Ер адам',icon:'🏃',price:7500,badge:'',sizes:['S','M','L','XL'],bg:'#f5f5f5'},
];

let activeFilter='Барлығы',cart=[],liked=new Set(),likedOnly=false,currentProduct=null,selectedSize=null;

function badgeClass(b){return b==='Жаңа'?'badge-new':b==='Жеңілдік'?'badge-sale':b==='Hot'?'badge-hot':'';}

function renderGrid(){
  const q=(document.getElementById('search-inp').value||'').toLowerCase();
  const grid=document.getElementById('product-grid');
  let list=products.filter(p=>{
    const catOk=activeFilter==='Барлығы'||p.cat===activeFilter||p.badge===activeFilter;
    const qOk=!q||p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);
    const likedOk=!likedOnly||liked.has(p.id);
    return catOk&&qOk&&likedOk;
  });
  if(!list.length){
    grid.innerHTML='<div class="empty-state"><i class="ti ti-mood-empty"></i>Тауар табылмады</div>';
    return;
  }
  grid.innerHTML=list.map(p=>{
    const inCart=!!cart.find(c=>c.id===p.id);
    const isLiked=liked.has(p.id);
    return`<div class="card" onclick="openModal(${p.id})">
      <div class="card-img" style="background:${p.bg}">
        ${p.badge?`<span class="card-badge ${badgeClass(p.badge)}">${p.badge}</span>`:''}
        <span class="card-wish ${isLiked?'liked':''}" onclick="toggleLike(event,${p.id})" title="Таңдаулы"><i class="ti ti-heart"></i></span>
        <span style="font-size:54px;line-height:1">${p.icon}</span>
      </div>
      <div class="card-body">
        <div class="card-cat">${p.cat}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-sizes">${p.sizes.slice(0,4).map(s=>`<span class="sz">${s}</span>`).join('')}${p.sizes.length>4?`<span class="sz">+${p.sizes.length-4}</span>`:''}</div>
        <div class="card-footer">
          <div>
            <span class="price">${p.price.toLocaleString()} ₸</span>
            ${p.oldPrice?`<span class="old-price">${p.oldPrice.toLocaleString()} ₸</span>`:''}
          </div>
          <button class="add-btn ${inCart?'added':''}" onclick="quickAdd(event,${p.id})">
            <i class="ti ti-${inCart?'check':'shopping-bag'}" style="font-size:13px"></i>
            ${inCart?'Қосылды':'Себет'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(el,f){
  activeFilter=f;likedOnly=false;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  renderGrid();
}

function filterCat(c,el){
  activeFilter=c;likedOnly=false;
  document.querySelectorAll('.nav-link').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  renderGrid();
}

function toggleLikedView(){
  likedOnly=!likedOnly;
  renderGrid();
}

function toggleLike(e,id){
  e.stopPropagation();
  liked.has(id)?liked.delete(id):liked.add(id);
  renderGrid();
  showToast(liked.has(id)?'Таңдаулыға қосылды ❤':'Таңдаулыдан алынды');
}

function quickAdd(e,id){
  e.stopPropagation();
  const p=products.find(x=>x.id===id);
  if(!cart.find(c=>c.id===id)){
    cart.push({...p,size:p.sizes[0]});
    showToast(p.name+' себетке қосылды ✓');
  } else {
    cart=cart.filter(c=>c.id!==id);
    showToast(p.name+' себеттен алынды');
  }
  updateCart();renderGrid();
}

function openModal(id){
  const p=products.find(x=>x.id===id);
  currentProduct=p; selectedSize=null;
  document.getElementById('modal-icon').textContent=p.icon;
  document.getElementById('modal-img').style.background=p.bg;
  document.getElementById('modal-cat').textContent=p.cat;
  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-price').textContent=p.price.toLocaleString()+' ₸';
  const old=document.getElementById('modal-old');
  old.textContent=p.oldPrice?p.oldPrice.toLocaleString()+' ₸':'';
  document.getElementById('modal-sizes').innerHTML=p.sizes.map(s=>
    `<span class="modal-sz" onclick="selectSize(this,'${s}')">${s}</span>`
  ).join('');
  const inCart=!!cart.find(c=>c.id===id);
  const btn=document.getElementById('modal-add-btn');
  btn.textContent=inCart?'✓ Себетте':'🛍 Себетке қосу';
  btn.className='modal-add'+(inCart?' added':'');
  document.getElementById('modal-bg').classList.add('open');
}

function selectSize(el,s){
  selectedSize=s;
  document.querySelectorAll('.modal-sz').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
}

function modalAddCart(){
  if(!currentProduct)return;
  const p=currentProduct;
  if(!cart.find(c=>c.id===p.id)){
    cart.push({...p,size:selectedSize||p.sizes[0]});
    showToast(p.name+' себетке қосылды ✓');
    const btn=document.getElementById('modal-add-btn');
    btn.textContent='✓ Себетте';
    btn.classList.add('added');
  } else {
    cart=cart.filter(c=>c.id!==p.id);
    showToast(p.name+' себеттен алынды');
    document.getElementById('modal-add-btn').textContent='🛍 Себетке қосу';
    document.getElementById('modal-add-btn').classList.remove('added');
  }
  updateCart();renderGrid();
}

function closeModal(e){if(e.target===document.getElementById('modal-bg'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-bg').classList.remove('open');}

function removeCart(id){
  cart=cart.filter(c=>c.id!==id);
  updateCart();renderGrid();
}

function updateCart(){
  const count=cart.length;
  document.getElementById('cart-count').textContent=count;
  const body=document.getElementById('cart-body');
  if(!count){body.innerHTML='<div class="cart-empty">Себет бос</div>';return;}
  const total=cart.reduce((s,c)=>s+c.price,0);
  body.innerHTML=cart.map(c=>`
    <div class="cart-item">
      <span class="ci-icon">${c.icon}</span>
      <div style="flex:1">
        <div class="ci-name">${c.name}</div>
        ${c.size?`<div style="font-size:11px;color:#aaa">Өлшем: ${c.size}</div>`:''}
      </div>
      <span class="ci-price">${c.price.toLocaleString()} ₸</span>
      <span class="ci-rm" onclick="removeCart(${c.id})" title="Алып тастау"><i class="ti ti-x"></i></span>
    </div>
  `).join('')+`
    <div class="cart-total">
      <span class="total-label">Жалпы сомасы</span>
      <span class="total-val">${total.toLocaleString()} ₸</span>
    </div>
    <button class="checkout-btn" onclick="checkout(${total})">Тапсырыс беру →</button>
  `;
}

function checkout(total){
  alert('Тапсырысыңыз қабылданды!\nЖалпы сомасы: '+total.toLocaleString()+' ₸\n\nСізбен жақын арада байланысамыз.');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

renderGrid();
</script>
</body>
</html>
